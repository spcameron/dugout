version: "3.9"

services:
  db:
    image: postgres:16
    container_name: roster_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -UY postgres -d roster"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
