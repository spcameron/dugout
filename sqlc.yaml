version: "2"

sql:
  - engine: postgresql
    schema:
      - "migrations/*.sql"
    queries:
      - "queries/*.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "database/sql"
        emit_json_tags: true
        # emit_db_tags: true
        # emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "numeric"
            go_type: "float64"
